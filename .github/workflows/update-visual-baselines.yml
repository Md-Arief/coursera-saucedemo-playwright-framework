name: Update Visual Baselines

# Run manually from Actions tab to regenerate Linux screenshot baselines
# after intentional UI changes on Sauce Demo.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-baselines:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright and Browsers
        run: npx playwright install --with-deps chromium

      - name: Regenerate Linux visual baselines
        run: npx playwright test tests/visual --project=chromium --update-snapshots

      - name: Commit updated baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "tests/visual/**/*.png"
          if git diff --staged --quiet; then
            echo "No snapshot changes to commit."
            exit 0
          fi
          git commit -m "chore(ci): update Linux visual regression baselines"
          git push
